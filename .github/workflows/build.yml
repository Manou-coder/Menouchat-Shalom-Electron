name: Build Cross-Platform

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: deb/x64/*.deb
          - os: windows-latest
            artifact: squirrel.windows/x64/*.exe
          - os: macos-latest
            artifact: zip/darwin/x64/*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y dpkg fakeroot

      - name: Install dependencies
        run: pnpm install
        env:
          CI: true

      - name: Build
        run: pnpm exec electron-forge make
        env:
          CI: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ runner.os }}
          path: out/make/${{ matrix.artifact }}
          if-no-files-found: error
