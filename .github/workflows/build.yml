name: Build Cross-Platform

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculer et créer le tag
        id: bump
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          [ -z "$LATEST" ] && LATEST="v1.0.0"
          LATEST=$(echo "$LATEST" | sed 's/^v\./v/')
          VERSION=${LATEST#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Tag créé : $NEW_TAG"

  build:
    needs: create-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: out/make/**/*.deb
          - os: windows-latest
            artifact: out/make/**/*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y dpkg fakeroot

      - name: Install dependencies
        run: pnpm install
        env:
          CI: true

      - name: Synchroniser la version dans package.json avec le tag
        run: npm version ${{ needs.create-tag.outputs.tag }} --no-git-tag-version

      - name: Build
        run: pnpm exec electron-forge make
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ runner.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: [create-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.tag }}
          files: artifacts/**/*
          generate_release_notes: true
