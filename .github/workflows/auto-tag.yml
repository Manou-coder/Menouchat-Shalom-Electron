name: Auto Tag on Main

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculer le prochain tag
        id: tag
        run: |
          # Récupère le dernier tag semver, normalise le format (ex: v.1.1.2 → v1.1.2)
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v1.0.0"
          fi
          LATEST=$(echo "$LATEST" | sed 's/^v\./v/')
          VERSION=${LATEST#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Nouveau tag : $NEW_TAG"

      - name: Créer et pousser le tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.new_tag }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"
